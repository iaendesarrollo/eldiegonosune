<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL DIEGO NOS UNE</title>
    <!-- Tailwind CSS para estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse para leer CSV desde URL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous"></script>
    <!-- FontAwesome para iconografía en los marcadores -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fuentes de Google (Montserrat) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet CSS y JS (Para el Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #E2F1F7;
            color: #0F172A;
        }
        
        #map { 
            z-index: 10; 
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        /* Scrollbar personalizado */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* Estilos Glassmorphism para los Popups (Tooltips) de Leaflet */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.65) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.8) !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            border-radius: 12px !important;
            color: #0F172A !important;
            padding: 4px !important;
        }
        .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.65) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.8) !important;
            border-top: none !important;
            border-left: none !important;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.05) !important;
        }
        .leaflet-popup-close-button {
            color: #0B5F8D !important;
            font-weight: bold !important;
            margin-top: 4px !important;
            margin-right: 4px !important;
        }

        /* Ajustes de Altura para Dashboard */
        @media (min-width: 1024px) {
            .app-container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .content-area {
                flex: 1;
                display: flex;
                overflow: hidden;
            }
            .sidebar-scroll {
                overflow-y: auto;
                height: 100%;
            }
            .map-fixed {
                flex: 1;
                height: 100%;
            }
        }
    </style>
</head>
<body class="app-container">

    <!-- Encabezado Institucional -->
    <header class="bg-[#51A5D4] relative z-20 flex items-center justify-center w-full shrink-0 h-[100px] overflow-hidden">
        <!-- Ruta Relativa: Buscará la imagen en la misma carpeta que index.html -->
        <img src="EL DIEGO NOS UNE.jpg" 
             alt="El Diego Nos Une" 
             class="h-full w-auto object-contain py-2"
             onerror="this.onerror=null; this.src='https://via.placeholder.com/600x100/51A5D4/FFFFFF?text=Logo+No+Encontrado';">
    </header>

    <!-- Contenedor Principal con Scroll Independiente -->
    <main id="map-view" class="content-area w-full max-w-[1800px] mx-auto p-4 sm:p-6 lg:p-8 flex flex-col gap-4">
        
        <!-- Layout Sidebar/Map -->
        <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-0 h-full">
            
            <!-- MENU LATERAL IZQUIERDO -->
            <aside class="w-full lg:w-80 bg-[#FFFFFF] rounded-xl shadow-md border border-[#E6EDF3] flex flex-col relative z-20 sidebar-scroll custom-scrollbar shrink-0">
                <div class="p-4 border-b border-[#E6EDF3] bg-[#F3F6F9] sticky top-0 z-30 flex items-center gap-2">
                    <i data-lucide="layers" class="text-[#0B5F8D] h-5 w-5"></i>
                    <h3 class="font-bold text-[#0F172A] uppercase tracking-wide text-sm">Panel de Control</h3>
                </div>
                
                <div class="p-5 space-y-6">
                    
                    <!-- Leyenda de Colores Geográficos -->
                    <div class="bg-[#F8FAFC] p-4 rounded-lg border border-[#E2E8F0]">
                        <h4 class="text-[11px] font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-1.5">
                            <i data-lucide="map-pin" class="h-3.5 w-3.5"></i> Referencia Geográfica
                        </h4>
                        <div class="space-y-2">
                            <div class="flex items-center gap-3">
                                <span class="w-3.5 h-3.5 rounded-full bg-[#4AB5E0] shadow-sm border border-gray-300"></span>
                                <span class="text-sm font-semibold text-[#0F172A]">Lanús (Celeste)</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="w-3.5 h-3.5 rounded-full bg-[#E63946] shadow-sm border border-gray-300"></span>
                                <span class="text-sm font-semibold text-[#0F172A]">Lomas de Zamora (Rojo)</span>
                            </div>
                            <div class="flex items-center gap-3 mt-1">
                                <span class="w-3.5 h-3.5 rounded-full bg-[#94A3B8] shadow-sm border border-gray-300"></span>
                                <span class="text-xs text-[#64748B]">Sin definir / Otros</span>
                            </div>
                        </div>
                    </div>

                    <!-- Lista de Capas Dinámicas (Por Tipo) -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="filter" class="h-4 w-4"></i> Filtrar por Tipo
                        </h4>
                        <div id="lista-tipos" class="space-y-1">
                            <p class="text-xs text-[#64748B] italic" id="msg-vacio">
                                <i class="fa-solid fa-spinner fa-spin mr-1"></i> Sincronizando datos...
                            </p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- MAPA PRINCIPAL -->
            <div class="map-fixed bg-[#FFFFFF] p-2 rounded-xl shadow-md border border-[#E6EDF3] relative z-10 flex flex-col min-h-[500px]">
                <div id="map" class="rounded-lg"></div>
            </div>

        </div>
    </main>

    <!-- Scripts de Lógica -->
    <script>
        lucide.createIcons();

        // ---------------------------------------------------------
        // RUTA RELATIVA: Buscará el archivo CSV en la misma carpeta.
        // Asegúrate de que el CSV se llame exactamente así.
        // ---------------------------------------------------------
        const CSV_URL = 'EL DIEGO NOS UNE - Hoja 1.csv'; 
        
        let map;
        let capasPorTipo = {};

        // Asignación de Color por Municipio
        function getColorForPartido(partido) {
            if (!partido) return '#94A3B8';
            const p = String(partido).toLowerCase();
            if (p.includes('lanus') || p.includes('lanús')) return '#4AB5E0'; 
            if (p.includes('lomas')) return '#E63946'; 
            return '#94A3B8';
        }

        // Asignación de Iconografía por Tipo de Obra
        function getIconForTipo(tipo) {
            if (!tipo) return 'fa-solid fa-location-dot';
            const t = String(tipo).toLowerCase();
            
            if (t.includes('mural')) return 'fa-solid fa-paintbrush';
            if (t.includes('arbol') || t.includes('árbol') || t.includes('arbolado')) return 'fa-solid fa-tree';
            if (t.includes('luz') || t.includes('ilumina') || t.includes('led') || t.includes('luminaria')) return 'fa-solid fa-lightbulb';
            if (t.includes('rampa')) return 'fa-solid fa-wheelchair';
            if (t.includes('piso')) return 'fa-solid fa-table-cells-large'; 
            if (t.includes('cordon') || t.includes('cordón')) return 'fa-solid fa-road'; 
            if (t.includes('reductor')) return 'fa-solid fa-car'; 
            if (t.includes('bacheo') || t.includes('pavimento') || t.includes('hormigon') || t.includes('asfalto') || t.includes('tj') || t.includes('pali')) return 'fa-solid fa-road';
            
            if (t.includes('refugio') || t.includes('parada') || t.includes('colectivo')) return 'fa-solid fa-bus-simple';
            if (t.includes('salud') || t.includes('hospital') || t.includes('clinica')) return 'fa-solid fa-house-medical';
            if (t.includes('plaza') || t.includes('parque') || t.includes('verde')) return 'fa-solid fa-tree';
            if (t.includes('seguridad') || t.includes('camara') || t.includes('policia') || t.includes('alarma')) return 'fa-solid fa-shield-halved';
            
            return 'fa-solid fa-location-dot'; 
        }

        function initMap() {
            // Inicializar mapa centrado en zona sur
            map = L.map('map').setView([-34.745, -58.365], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

            setTimeout(() => {
                map.invalidateSize();
                cargarDatos();
            }, 500);
        }

        function cargarDatos() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    procesarDatos(results.data);
                },
                error: function(err) {
                    console.error("Error al cargar el CSV:", err);
                    document.getElementById('msg-vacio').innerHTML = `
                        <div class="bg-red-50 text-red-600 p-3 rounded text-xs border border-red-200 mt-2">
                            <b>Error de Carga Local (CORS)</b><br>
                            Si abriste este archivo directamente con doble clic en tu computadora, los navegadores bloquean la carga de archivos por seguridad.<br><br>
                            <b>Solución:</b> Sube el <i>index.html</i>, el <i>.csv</i> y el <i>.jpg</i> juntos a GitHub y activa <b>GitHub Pages</b>.
                        </div>`;
                }
            });
        }

        function procesarDatos(data) {
            const msgVacio = document.getElementById('msg-vacio');
            if (msgVacio) msgVacio.style.display = 'none';

            const globalBounds = L.latLngBounds();
            let tiposEncontrados = new Set();
            let puntosProcesados = 0;

            data.forEach(row => {
                const latKey = Object.keys(row).find(k => k && k.match(/^(lat|latitude|latitud)$/i));
                const lonKey = Object.keys(row).find(k => k && k.match(/^(lon|lng|longitude|longitud)$/i));
                const tipoKey = Object.keys(row).find(k => k && k.match(/^(tipo|categoria|obra)$/i));
                const partidoKey = Object.keys(row).find(k => k && k.match(/^(partido|municipio|ciudad)$/i));

                if (latKey && lonKey) {
                    const lat = parseFloat(row[latKey]);
                    const lon = parseFloat(row[lonKey]);
                    const tipo = tipoKey && row[tipoKey] ? row[tipoKey] : 'Otros';
                    const partido = partidoKey && row[partidoKey] ? row[partidoKey] : '';

                    if (!isNaN(lat) && !isNaN(lon)) {
                        puntosProcesados++;
                        tiposEncontrados.add(tipo);
                        const color = getColorForPartido(partido);
                        const iconClass = getIconForTipo(tipo);
                        
                        const markerHtml = `
                            <div style="background-color: ${color}; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.3);">
                                <i class="${iconClass} text-white" style="font-size: 13px;"></i>
                            </div>
                        `;
                        
                        const customIcon = L.divIcon({ 
                            html: markerHtml, 
                            className: 'custom-div-icon bg-transparent border-none', 
                            iconSize: [28, 28], 
                            iconAnchor: [14, 14] 
                        });
                        
                        const marker = L.marker([lat, lon], { icon: customIcon });
                        
                        // Armar el Popup (Tooltip) ocultando Latitud y Longitud (Y con Glassmorphism)
                        let popupContent = '<div class="font-sans text-sm p-1"><ul class="space-y-2">';
                        for (let key in row) {
                            if(row[key] !== null && row[key] !== '') {
                                const keyLow = key.toLowerCase();
                                if (keyLow === 'lat' || keyLow === 'latitud' || keyLow === 'latitude' || 
                                    keyLow === 'lon' || keyLow === 'longitud' || keyLow === 'longitude') {
                                    continue;
                                }
                                popupContent += `<li class="border-b border-gray-400/20 pb-1 last:border-0"><b class="capitalize text-[#0B5F8D] block text-xs tracking-wider">${key}</b> <span class="text-[#0F172A] font-medium">${row[key]}</span></li>`;
                            }
                        }
                        popupContent += '</ul></div>';
                        
                        marker.bindPopup(popupContent, { maxWidth: 320, minWidth: 200 });
                        
                        if (!capasPorTipo[tipo]) {
                            capasPorTipo[tipo] = L.layerGroup();
                        }
                        marker.addTo(capasPorTipo[tipo]);
                        globalBounds.extend([lat, lon]);
                    }
                }
            });

            crearMenuFiltros(Array.from(tiposEncontrados));

            if (puntosProcesados > 0 && globalBounds.isValid()) {
                map.fitBounds(globalBounds, { padding: [40, 40] });
            } else if (puntosProcesados === 0) {
                 document.getElementById('lista-tipos').innerHTML = `<p class="text-xs text-[#64748B] italic">No se encontraron coordenadas válidas en el archivo.</p>`;
            }
        }

        function crearMenuFiltros(tiposNuevos) {
            const listaTipos = document.getElementById('lista-tipos');

            tiposNuevos.forEach(tipo => {
                if(document.getElementById(`filtro-${tipo.replace(/\s+/g, '-')}`)) return;

                const layerGroup = capasPorTipo[tipo];
                layerGroup.addTo(map); 

                const iconClass = getIconForTipo(tipo);
                
                const item = document.createElement('label');
                item.id = `filtro-${tipo.replace(/\s+/g, '-')}`;
                item.className = 'flex items-center gap-3 cursor-pointer group p-2 hover:bg-[#F3F6F9] rounded transition-colors border border-transparent hover:border-[#E6EDF3]';
                item.innerHTML = `
                    <input type="checkbox" checked class="w-4 h-4 accent-[#0B5F8D]" onchange="toggleLayer('${tipo}', this.checked)">
                    <span class="w-7 h-7 rounded-full flex items-center justify-center bg-[#E2F1F7] text-[#0B5F8D] shadow-sm border border-[#D1E1F0]">
                        <i class="${iconClass} text-[11px]"></i>
                    </span>
                    <span class="text-sm text-[#0F172A] font-medium truncate flex-1" title="${tipo}">${tipo}</span>
                `;
                listaTipos.appendChild(item);
            });
        }

        window.toggleLayer = function(tipo, isVisible) {
            if (capasPorTipo[tipo]) {
                isVisible ? map.addLayer(capasPorTipo[tipo]) : map.removeLayer(capasPorTipo[tipo]);
            }
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
